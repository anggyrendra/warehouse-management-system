services:
  # ===== PostgreSQL =====
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-warehouse}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-warehouse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ===== Redis (optional cache, nilai tambah) =====
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ===== Backend API (Go) =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8080"
      APP_ENV: "production"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-warehouse}
      DB_SSLMODE: disable
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MIGRATIONS_DIR: "./migrations"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ===== Frontend (React, served via nginx) =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass the API base URL at build time. In Docker Compose the frontend
        # container talks to the backend over the shared network.
        VITE_API_BASE_URL: /api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
